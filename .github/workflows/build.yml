name: Build & Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write  # required to create releases / upload assets

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # If you're building a single-file executable with PyInstaller:
      - name: Build (PyInstaller)
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name trimtool trimtool.py

      - name: Package
        shell: bash
        run: |
          mkdir -p out
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/trimtool.exe out/trimtool-${{ runner.os }}.exe
          else
            cp dist/trimtool out/trimtool-${{ runner.os }}
          fi

      - name: Ensure tag exists (manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG" || true
          git push origin "$TAG" || true

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
          files: out/*
